# QuantVista Alembic configuration.
# The database URL is injected from the $DATABASE_URL environment variable in env.py,
# so no credentials live in this file (see ../plans/07-security-and-compliance.md §4).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# version_path_separator and timezone for migration filenames/timestamps
timezone = UTC

# sqlalchemy.url is intentionally left blank — set via $DATABASE_URL in env.py.
sqlalchemy.url =

[post_write_hooks]
# Format generated migrations with Ruff (matches project tooling, ../plans/08 §5).
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
