name: CI

# Runs on every PR targeting master and on direct pushes to master.
# Path filtering is done per-job (via detect-changes) rather than at the workflow
# level, so the required `ci-success` check is never left "Expected — waiting".
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend-quality:
    name: Backend lint, types & imports
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (with dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (strict)
        run: mypy
      - name: Import-linter (bounded-context DAG)
        run: lint-imports

  backend-tests:
    name: Backend tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (with dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Pytest (unit; integration auto-skips without a DB)
        run: pytest

  backend-rls:
    name: Backend RLS (cross-tenant denial)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantvista
          POSTGRES_PASSWORD: quantvista
          POSTGRES_DB: quantvista
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantvista -d quantvista"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # App role = non-superuser (RLS enforced); admin role = the postgres superuser.
      DATABASE_URL: postgresql+psycopg://quantvista_app:quantvista_app@localhost:5432/quantvista
      ADMIN_DATABASE_URL: postgresql+psycopg://quantvista:quantvista@localhost:5432/quantvista
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (with dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Create non-superuser app role
        env:
          PGPASSWORD: quantvista
        run: psql -h localhost -U quantvista -d quantvista -v ON_ERROR_STOP=1 -f ../scripts/db/00-create-app-role.sql
      - name: Apply migrations (admin role)
        working-directory: backend/src/quantvista/db
        env:
          DATABASE_URL: postgresql+psycopg://quantvista:quantvista@localhost:5432/quantvista
        run: alembic upgrade head
      - name: Grant app role DML on migrated schema
        env:
          PGPASSWORD: quantvista
        run: |
          psql -h localhost -U quantvista -d quantvista -v ON_ERROR_STOP=1 -c "
            GRANT USAGE ON SCHEMA public TO quantvista_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO quantvista_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO quantvista_app;"
      - name: RLS / cross-tenant denial tests (as app role)
        run: pytest -m integration

  frontend-quality:
    name: Frontend lint & typecheck
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend build
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Next.js build
        run: npm run build

  # Aggregator gate — the single required status check on master.
  # Always runs; fails if any needed job failed or was cancelled. Skipped jobs
  # (path-filtered out) are allowed, so a backend-only or frontend-only PR still passes.
  ci-success:
    name: CI success
    if: always()
    needs:
      - detect-changes
      - backend-quality
      - backend-tests
      - backend-rls
      - frontend-quality
      - frontend-build
    runs-on: ubuntu-latest
    steps:
      - name: Verify no job failed
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Needed job results: $results"
          case "$results" in
            *failure*|*cancelled*)
              echo "::error::One or more required CI jobs failed or were cancelled."
              exit 1
              ;;
          esac
          echo "All required CI jobs passed (or were skipped via path filter)."
