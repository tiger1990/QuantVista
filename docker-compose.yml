# QuantVista — local development stack. One command: `docker compose up`.
# Reads variables from `.env` (copy from `.env.example`). The three backend roles
# (api/worker/beat) share ONE image (quantvista-backend:local), differing by command.

name: quantvista

x-backend-image: &backend-image quantvista-backend:local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Creates the non-superuser app role on first init (so RLS is enforced).
      - ./scripts/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [quantvista-net]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [quantvista-net]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    networks: [quantvista-net]

  # One-shot: apply Alembic migrations as the admin role. Gates the app services.
  migrate:
    build: ./backend
    image: *backend-image
    command: ["sh", "-c", "cd /app/db && alembic upgrade head"]
    environment:
      DATABASE_URL: ${ADMIN_DATABASE_URL}
    depends_on:
      postgres: {condition: service_healthy}
    restart: "no"
    networks: [quantvista-net]

  # One-shot: load idempotent reference seed via psql (needs the postgres client).
  seed:
    image: postgres:16-alpine
    command: ["sh", "-c", "psql -v ON_ERROR_STOP=1 -f /seed/seed_reference.sql"]
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./backend/src/quantvista/db/seeds:/seed:ro
    depends_on:
      migrate: {condition: service_completed_successfully}
    restart: "no"
    networks: [quantvista-net]

  api:
    build: ./backend
    image: *backend-image
    command:
      ["uvicorn", "quantvista.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    ports: ["8000:8000"]
    depends_on:
      seed: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks: [quantvista-net]

  worker:
    build: ./backend
    image: *backend-image
    command: ["celery", "-A", "quantvista.jobs.celery_app", "worker", "-l", "info"]
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      seed: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    restart: unless-stopped
    networks: [quantvista-net]

  beat:
    build: ./backend
    image: *backend-image
    command: ["celery", "-A", "quantvista.jobs.celery_app", "beat", "-l", "info"]
    environment:
      APP_ENV: ${APP_ENV}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis: {condition: service_healthy}
    restart: unless-stopped
    networks: [quantvista-net]

  web:
    build: ./frontend
    image: quantvista-web:local
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks: [quantvista-net]

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  quantvista-net:
    name: quantvista-net
